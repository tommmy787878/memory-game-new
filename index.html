<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神経衰弱</title>

<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:sans-serif;
}

/* スタート */
#startScreen{
position:fixed;width:100%;height:100%;
background:#fff;color:#000;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
}

.title{ font-size:clamp(36px,8vw,60px); margin-bottom:30px; }

select,button,input{
padding:12px;
font-size:clamp(14px,4vw,22px);
margin:6px;
}

button{
border:none;border-radius:10px;
cursor:pointer;
transition:0.2s;
}
button:hover{transform:scale(1.05);}
button:active{transform:scale(0.9);}

/* ゲーム */
#game{
display:none;
height:100%;
background:#0f172a;
color:white;
text-align:center;
display:flex;
flex-direction:column;
}

#info{
font-size:clamp(14px,4vw,20px);
}

/* ボード */
.board{
display:grid;
gap:5px;
padding:5px;
flex:1;
}

.card{
aspect-ratio:3/4;
width:100%;
perspective:800px;
}

.inner{
width:100%;height:100%;
transition:0.4s;
transform-style:preserve-3d;
position:relative;
}

.card.flip .inner{
transform:rotateY(180deg);
}

.face{
position:absolute;
width:100%;height:100%;
backface-visibility:hidden;
}

.face img{
width:100%;
height:100%;
border-radius:8px;
}

.front{transform:rotateY(180deg);}
.taken{opacity:0.4;}

/* 結果 */
#result{
position:fixed;width:100%;height:100%;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.9);
color:white;
}

#ranking{
font-size:clamp(12px,3.5vw,18px);
}
</style>

</head>
<body>

<!-- スタート -->

<div id="startScreen">
<div class="title">神経衰弱</div>

<select id="difficulty">
<option value="easy">やさしい</option>
<option value="normal">ふつう</option>
<option value="hard">むずかしい</option>
</select>

<button onclick="startGame()">あそぶ</button>

</div>

<!-- ゲーム -->

<div id="game">
<div id="info">
<h2 id="turnText"></h2>
<p id="score"></p>
<p id="timer"></p>
</div>
<div class="board" id="board"></div>
</div>

<!-- 結果 -->

<div id="result">
<h2 id="resultText"></h2>
<p id="timeText"></p>

<input id="playerName" placeholder="名前を入力" maxlength="10">
<button onclick="saveScore()">ランキング登録</button>

<div id="ranking"></div>

<button onclick="restartGame()">もう一度あそぶ</button>

</div>

<script>
const cardSets={
easy:["AS","AH","KD"], //6枚
normal:["AS","AH","KD","KC","QS"], //10枚
hard:["AS","AH","KD","KC","QS","QD","JC"] //14枚
};

const getImg=c=>`https://deckofcardsapi.com/static/img/${c}.png`;
const backImg="https://deckofcardsapi.com/static/img/back.png";

let first,second,lock,turn,scores,memory;
let difficulty,startTime,timerInterval;

/* スタート */
function startGame(){
difficulty=document.getElementById("difficulty").value;

document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="flex";

startTime=Date.now();
timerInterval=setInterval(updateTimer,1000);

init();
}

/* タイマー */
function updateTimer(){
let t=Math.floor((Date.now()-startTime)/1000);
document.getElementById("timer").textContent=`タイム:${t}秒`;
}

/* 初期化 */
function init(){
let board=document.getElementById("board");
board.innerHTML="";

first=null;second=null;lock=false;
turn=0;scores=[0,0];memory={};

let base=cardSets[difficulty];
let deck=[...base,...base].sort(()=>Math.random()-0.5);

/* 列調整（重要） */
let cols = deck.length<=6 ? 3 : deck.length<=10 ? 4 : 4;
board.style.gridTemplateColumns=`repeat(${cols},1fr)`;

deck.forEach(c=>{
let card=document.createElement("div");
card.className="card";
card.dataset.value=c;

let inner=document.createElement("div");
inner.className="inner";

inner.innerHTML=`
<div class="face front"><img src="${getImg(c)}"></div>
<div class="face back"><img src="${backImg}"></div>
`;

card.appendChild(inner);
card.onclick=()=>click(card);
board.appendChild(card);
});

update();
}

function update(){
document.getElementById("turnText").textContent=
turn===0?"あなた":"CPU";

document.getElementById("score").textContent=
`あなた:${scores[0]} / CPU:${scores[1]}`;
}

function click(card){
if(turn!==0||lock||card.classList.contains("flip")||card.classList.contains("taken"))return;

flip(card);
if(!first){first=card;return;}
second=card;
judge();
}

function flip(card){
card.classList.add("flip");
let v=card.dataset.value;
memory[v]=memory[v]||[];
if(!memory[v].includes(card))memory[v].push(card);
}

function judge(){
lock=true;

setTimeout(()=>{
if(first.dataset.value===second.dataset.value){
first.classList.add("taken");
second.classList.add("taken");
scores[turn]++;
reset(true);
}else{
first.classList.remove("flip");
second.classList.remove("flip");
reset(false);
}
},500);
}

function reset(success){
first=null;second=null;lock=false;
if(!success) turn=1-turn;
update();

if(checkEnd())return;
if(turn===1)setTimeout(cpu,600);
}

/* CPU */
function cpu(){
let choices=[...document.querySelectorAll(".card:not(.flip):not(.taken)")];
let c1=choices[Math.floor(Math.random()*choices.length)];
let c2;

do{
c2=choices[Math.floor(Math.random()*choices.length)];
}while(c1===c2);

flip(c1);first=c1;
setTimeout(()=>{
flip(c2);second=c2;
judge();
},400);
}

function checkEnd(){
if(document.querySelectorAll(".taken").length===document.querySelectorAll(".card").length){
setTimeout(endGame,300);
return true;
}
return false;
}

/* 終了 */
function endGame(){
clearInterval(timerInterval);

let time=Math.floor((Date.now()-startTime)/1000);

let text=scores[0]>scores[1]?"勝ち！":scores[1]>scores[0]?"負け":"引き分け";

document.getElementById("resultText").textContent=text;
document.getElementById("timeText").textContent=`タイム:${time}秒`;
document.getElementById("result").style.display="flex";

showRanking();
}

/* ランキング */
function saveScore(){
let name=document.getElementById("playerName").value||"名無し";
let key="rank_"+difficulty;

let rank=JSON.parse(localStorage.getItem(key)||"[]");

let time=parseInt(document.getElementById("timeText").textContent.replace(/\D/g,""));

rank.push({name,time});
rank.sort((a,b)=>a.time-b.time);
rank=rank.slice(0,5);

localStorage.setItem(key,JSON.stringify(rank));

showRanking();
}

function showRanking(){
let key="rank_"+difficulty;
let rank=JSON.parse(localStorage.getItem(key)||"[]");

let html="<h3>ランキング</h3>";
rank.forEach((r,i)=>html+=`${i+1}. ${r.name} ${r.time}秒<br>`);

document.getElementById("ranking").innerHTML=html;
}

function restartGame(){
location.reload();
}
</script>

</body>
</html>
