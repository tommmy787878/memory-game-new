<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神経衰弱</title>

<style>
body { margin:0; font-family:sans-serif; }
#startScreen{
position:fixed;width:100%;height:100%;
background:#fff;display:flex;
flex-direction:column;justify-content:center;align-items:center;
}
.title{ font-size:60px; margin-bottom:20px; }

select,button,input{
padding:10px;
font-size:18px;
margin:5px;
}

#homeRanking{
margin-top:15px;
background:#eee;
padding:10px;
border-radius:10px;
width:250px;
}

/* ゲーム */
#game{
display:none;background:#0f172a;color:white;
min-height:100vh;text-align:center;
}

.board{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;padding:10px;
}

.card{ aspect-ratio:3/4; perspective:800px; }
.inner{ width:100%;height:100%;transition:0.4s;transform-style:preserve-3d;position:relative;}
.card.flip .inner{ transform:rotateY(180deg); }

.face{ position:absolute;width:100%;height:100%;backface-visibility:hidden;}
.face img{ width:100%;height:100%; }
.front{ transform:rotateY(180deg); }
.taken{ opacity:0.4; }

/* 結果 */
#result{
position:fixed;top:0;left:0;width:100%;height:100%;
display:none;justify-content:center;align-items:center;
flex-direction:column;background:rgba(0,0,0,0.9);color:white;
}
</style>

</head>

<body>

<div id="startScreen">
<div class="title">神経衰弱</div>

<select id="difficulty" onchange="loadHomeRanking()">
<option value="easy">やさしい</option>
<option value="normal">ふつう</option>
<option value="hard">むずかしい</option>
<option value="oni">鬼</option>
</select>

<button onclick="startGame()">あそぶ</button>

<div id="homeRanking"></div>
</div>

<div id="game">
<p id="score"></p>
<div class="board" id="board"></div>
</div>

<div id="result">
<h2 id="resultText"></h2>

<div id="nameInputArea">
<input id="playerName" placeholder="名前">
<button onclick="submitScore()">登録</button>
</div>

<div id="ranking"></div>

<button onclick="restartGame()">もう一度</button> <button onclick="goHome()">ホーム</button>

</div>

<script>
const baseCards=["AS","AH","KD","KC","QS"];
const getImg=c=>`https://deckofcardsapi.com/static/img/${c}.png`;

let first=null, second=null;
let scores=0;
let difficulty="normal";
let startTime=0;
let finalTime=0;

function startGame(){
difficulty=document.getElementById("difficulty").value;
document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";

startTime=Date.now();
init();
}

function init(){
let board=document.getElementById("board");
board.innerHTML="";
first=null; second=null; scores=0;

let deck=[...baseCards,...baseCards].sort(()=>Math.random()-0.5);

deck.forEach(c=>{
let card=document.createElement("div");
card.className="card";
card.dataset.value=c;

let inner=document.createElement("div");
inner.className="inner";

let f=document.createElement("div");
f.className="face front";
f.innerHTML=`<img src="${getImg(c)}">`;

let b=document.createElement("div");
b.className="face back";
b.innerHTML=`<img src="https://deckofcardsapi.com/static/img/back.png">`;

inner.append(f,b);
card.appendChild(inner);

card.onclick=()=>click(card);
board.appendChild(card);
});
}

function click(card){
if(card.classList.contains("flip")) return;

card.classList.add("flip");

if(!first){ first=card; return; }

second=card;

setTimeout(()=>{
if(first.dataset.value===second.dataset.value){
scores++;
}else{
first.classList.remove("flip");
second.classList.remove("flip");
}
first=null; second=null;

if(document.querySelectorAll(".flip").length===10){
endGame();
}
},500);
}

function endGame(){
finalTime=Math.floor((Date.now()-startTime)/1000);

document.getElementById("resultText").textContent=
"クリア！ "+finalTime+"秒";

document.getElementById("game").style.display="none";
document.getElementById("result").style.display="flex";

showRanking();
}

function submitScore(){
let name=document.getElementById("playerName").value || "名無し";

let key="ranking_"+difficulty;
let data=JSON.parse(localStorage.getItem(key))||[];

data.push({name:name,time:finalTime});
data.sort((a,b)=>a.time-b.time);
data=data.slice(0,5);

localStorage.setItem(key,JSON.stringify(data));

/* ★登録完了表示 */
document.getElementById("nameInputArea").innerHTML="<p>登録完了！</p>";

showRanking();
loadHomeRanking();
}

function showRanking(){
let key="ranking_"+difficulty;
let data=JSON.parse(localStorage.getItem(key))||[];

let html="<h3>ランキング</h3>";
data.forEach((d,i)=>{
html+=`<p>${i+1}位 ${d.name} - ${d.time}秒</p>`;
});
document.getElementById("ranking").innerHTML=html;
}

function loadHomeRanking(){
let key="ranking_"+document.getElementById("difficulty").value;
let data=JSON.parse(localStorage.getItem(key))||[];

let html="<b>ランキング</b>";
data.forEach((d,i)=>{
html+=`<p>${i+1}位 ${d.name} - ${d.time}秒</p>`;
});
if(data.length===0) html+="<p>まだ記録なし</p>";

document.getElementById("homeRanking").innerHTML=html;
}

function restartGame(){
document.getElementById("result").style.display="none";
startGame();
}

function goHome(){
document.getElementById("result").style.display="none";
document.getElementById("startScreen").style.display="flex";
loadHomeRanking();
}

loadHomeRanking();
</script>

</body>
</html>
