<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神経衰弱</title>

<style>
body { margin:0; font-family:sans-serif; }

/* スタート */
#startScreen{
position:fixed;width:100%;height:100%;
background:#fff;display:flex;
flex-direction:column;justify-content:center;align-items:center;
}

.title{ font-size:60px; letter-spacing:8px; margin-bottom:30px; }

select{ padding:14px 24px; margin-bottom:25px; font-size:22px; }

button{
padding:18px 60px;font-size:24px;
border:none;border-radius:10px;
cursor:pointer;transition:0.2s;
}
button:hover{ transform:scale(1.05); }
button:active{ transform:scale(0.9); }

#startBtn{ background:#000;color:#fff; }

/* ゲーム */
#game{
display:none;background:#0f172a;color:white;
min-height:100vh;text-align:center;
}

.board{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;padding:10px;
}

.card{ aspect-ratio:3/4; perspective:800px; }
.inner{
width:100%;height:100%;
transition:0.4s;transform-style:preserve-3d;
position:relative;
}
.card.flip .inner{ transform:rotateY(180deg) scale(1.05); }

.face{
position:absolute;width:100%;height:100%;
backface-visibility:hidden;
}
.face img{ width:100%;height:100%;border-radius:10px; }

.front{ transform:rotateY(180deg); }
.taken{ opacity:0.4; }

/* 結果 */
#result{
position:fixed;top:0;left:0;
width:100%;height:100%;
display:none;justify-content:center;align-items:center;
flex-direction:column;background:rgba(0,0,0,0.9);color:white;
}

#resultText{ font-size:42px;color:gold;margin-bottom:10px; }

/* 入力UI */
#nameInputArea{ margin:15px; }

#playerName{
padding:10px;
font-size:18px;
border-radius:6px;
border:none;
margin-right:10px;
}

.confetti{
position:fixed;width:8px;height:12px;
animation:fall linear forwards;
}
@keyframes fall{
to{ transform:translateY(100vh) rotate(720deg); }
}
</style>
</head>

<body>

<div id="startScreen">
<div class="title">神経衰弱</div>

<select id="difficulty">
<option value="easy">やさしい</option>
<option value="normal" selected>ふつう</option>
<option value="hard">むずかしい</option>
<option value="oni">鬼モード👹</option>
</select>

<button id="startBtn" onclick="startGame()">あそぶ</button>
</div>

<div id="game">
<h2 id="turnText">あなたのターン</h2>
<p id="score">あなた:0 / CPU:0</p>
<p id="timer">時間: 0秒</p>
<div class="board" id="board"></div>
</div>

<div id="result">
<div id="resultText"></div>

<select id="difficultyResult">
<option value="easy">やさしい</option>
<option value="normal">ふつう</option>
<option value="hard">むずかしい</option>
<option value="oni">鬼モード👹</option>
</select>

<!-- 名前入力 -->
<div id="nameInputArea">
<input id="playerName" placeholder="名前を入力" maxlength="10">
<button onclick="submitScore()">登録</button>
</div>

<div id="ranking"></div>

<button onclick="restartGame()">もう一度</button>
</div>

<script>
const baseCards=["AS","AH","KD","KC","QS"];
const getImg=c=>`https://deckofcardsapi.com/static/img/${c}.png`;
const backImg="https://deckofcardsapi.com/static/img/back.png";

let first=null, second=null, lock=false;
let turn=0;
let scores=[0,0];
let memory={};
let difficulty="normal";

let startTime=0;
let timerInterval=null;
let finalTime=0;

function startGame(){
difficulty=document.getElementById("difficulty").value;
document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";

startTime=Date.now();
timerInterval=setInterval(()=>{
let t=Math.floor((Date.now()-startTime)/1000);
document.getElementById("timer").textContent=`時間: ${t}秒`;
},1000);

init();
}

function init(){
let board=document.getElementById("board");
board.innerHTML="";
first=null; second=null; lock=false;
turn=0; scores=[0,0]; memory={};

let deck=[...baseCards,...baseCards].sort(()=>Math.random()-0.5);

deck.forEach(c=>{
let card=document.createElement("div");
card.className="card";
card.dataset.value=c;

let inner=document.createElement("div");
inner.className="inner";

let front=document.createElement("div");
front.className="face front";
front.innerHTML=`<img src="${getImg(c)}">`;

let back=document.createElement("div");
back.className="face back";
back.innerHTML=`<img src="${backImg}">`;

inner.append(front,back);
card.appendChild(inner);
card.onclick=()=>onClick(card);

board.appendChild(card);
});

update();
}

function update(){
document.getElementById("turnText").textContent =
turn===0?"あなたのターン":"CPUのターン";

document.getElementById("score").textContent =
`あなた:${scores[0]} / CPU:${scores[1]}`;
}

function onClick(card){
if(turn!==0 || lock || card.classList.contains("flip") || card.classList.contains("taken")) return;

flip(card);

if(!first){ first=card; return; }

second=card;
judge();
}

function flip(card){
card.classList.add("flip");
let v=card.dataset.value;
memory[v]=memory[v]||[];
if(!memory[v].includes(card)) memory[v].push(card);
}

function judge(){
lock=true;

setTimeout(()=>{
if(first.dataset.value===second.dataset.value){
first.classList.add("taken");
second.classList.add("taken");
scores[turn]++;
reset(true);
}else{
first.classList.remove("flip");
second.classList.remove("flip");
reset(false);
}
},600);
}

function reset(success){
first=null; second=null; lock=false;
if(!success) turn=1-turn;
update();

if(checkEnd()) return;
if(turn===1) setTimeout(cpu,700);
}

function cpu(){
let choices=[...document.querySelectorAll(".card:not(.flip):not(.taken)")];
let c1=choices[Math.floor(Math.random()*choices.length)];
let rest=choices.filter(c=>c!==c1);
let c2=rest[Math.floor(Math.random()*rest.length)];

flip(c1); first=c1;

setTimeout(()=>{
flip(c2); second=c2;
judge();
},400);
}

function checkEnd(){
if(document.querySelectorAll(".taken").length===10){
setTimeout(endGame,300);
return true;
}
return false;
}

function endGame(){
clearInterval(timerInterval);
finalTime=Math.floor((Date.now()-startTime)/1000);

let text="";
if(scores[0]>scores[1]) text="あなたの勝ち！🎉";
else if(scores[1]>scores[0]) text="CPUの勝ち…👹";
else text="引き分け！";

document.getElementById("resultText").textContent =
`${text}（${finalTime}秒）`;

document.getElementById("difficultyResult").value=difficulty;
document.getElementById("result").style.display="flex";

/* 名前復元 */
document.getElementById("playerName").value =
localStorage.getItem("playerName") || "";

/* 紙吹雪 */
document.querySelectorAll(".confetti").forEach(e=>e.remove());
for(let i=0;i<50;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"%";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
c.style.animationDuration=(1+Math.random())+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),2000);
}
}

function submitScore(){
let name=document.getElementById("playerName").value.trim();
if(!name) name="名無し";

/* 名前保存 */
localStorage.setItem("playerName", name);

saveScore(name, finalTime);

/* 二重登録防止 */
document.getElementById("nameInputArea").innerHTML="<p>登録完了！</p>";
}

function saveScore(name,time){
let key="ranking_"+difficulty;
let data=JSON.parse(localStorage.getItem(key))||[];

if(typeof data[0]==="number"){
data=data.map(t=>({name:"名無し",time:t}));
}

data.push({name,time});
data.sort((a,b)=>a.time-b.time);
data=data.slice(0,5);

localStorage.setItem(key,JSON.stringify(data));
showRanking(data);
}

function showRanking(data){
let html="<h3>ランキング</h3>";
data.forEach((d,i)=>{
html+=`<p>${i+1}位 : ${d.name} - ${d.time}秒</p>`;
});
document.getElementById("ranking").innerHTML=html;
}

function restartGame(){
let diff=document.getElementById("difficultyResult").value;
document.getElementById("difficulty").value=diff;
document.getElementById("result").style.display="none";

/* 入力欄リセット */
document.getElementById("nameInputArea").innerHTML=
'<input id="playerName" placeholder="名前を入力" maxlength="10"><button onclick="submitScore()">登録</button>';

startGame();
}
</script>

</body>
</html>
