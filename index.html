```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神経衰弱</title>

<style>
body{margin:0;font-family:sans-serif;}

/* スタート */
#startScreen{
position:fixed;width:100%;height:100%;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
background:#fff;
}
.title{font-size:50px;margin-bottom:20px;}

select{padding:10px;font-size:18px;margin-bottom:20px;}
button{padding:15px 40px;font-size:20px;border:none;border-radius:8px;background:#000;color:#fff;}

/* ゲーム */
#game{
display:none;
background:#0f172a;color:#fff;
min-height:100vh;
text-align:center;
padding:5px;
}

.board{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(70px,1fr));
gap:8px;
padding:8px;
}

.card{aspect-ratio:3/4;perspective:800px;max-width:90px;margin:auto;}
.inner{
width:100%;height:100%;
transition:0.4s;
transform-style:preserve-3d;
position:relative;
}
.card.flip .inner{transform:rotateY(180deg);}
.face{
position:absolute;width:100%;height:100%;
backface-visibility:hidden;
}
.face img{width:100%;height:100%;border-radius:8px;}
.front{transform:rotateY(180deg);}
.taken{opacity:0.4;}

/* 結果 */
#result{
position:fixed;width:100%;height:100%;
display:none;justify-content:center;align-items:center;
flex-direction:column;background:rgba(0,0,0,0.9);color:#fff;
}
#resultText{font-size:30px;margin-bottom:10px;}
</style>
</head>

<body>

<div id="startScreen">
<div class="title">神経衰弱</div>
<select id="difficulty">
<option value="easy">やさしい</option>
<option value="normal" selected>ふつう</option>
<option value="hard">むずかしい（14枚）</option>
</select>
<button onclick="startGame()">あそぶ</button>
</div>

<div id="game">
<h3 id="turnText">あなたのターン</h3>
<p id="score">あなた:0 / CPU:0</p>
<div class="board" id="board"></div>
</div>

<div id="result">
<div id="resultText"></div>
<button onclick="restartGame()">もう一度</button>
</div>

<script>
const allCards=["AS","AH","KD","KC","QS","JD","10H","9C","8S"];
const getImg=c=>`https://deckofcardsapi.com/static/img/${c}.png`;
const backImg="https://deckofcardsapi.com/static/img/back.png";

let first=null,second=null,lock=false;
let turn=0;
let scores=[0,0];
let memory={};
let difficulty="normal";

function startGame(){
difficulty=document.getElementById("difficulty").value;
document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";
init();
}

function init(){
let board=document.getElementById("board");
board.innerHTML="";
first=null;second=null;lock=false;
turn=0;scores=[0,0];memory={};

// ペア数
let pairCount=5;
if(difficulty==="normal") pairCount=6;
if(difficulty==="hard") pairCount=7; // ←14枚

let base=allCards.slice(0,pairCount);
let deck=shuffle([...base,...base]);

deck.forEach(c=>{
let card=document.createElement("div");
card.className="card";
card.dataset.value=c;

let inner=document.createElement("div");
inner.className="inner";

let front=document.createElement("div");
front.className="face front";
front.innerHTML=`<img src="${getImg(c)}">`;

let back=document.createElement("div");
back.className="face back";
back.innerHTML=`<img src="${backImg}">`;

inner.append(front,back);
card.appendChild(inner);
card.onclick=()=>onClick(card);
board.appendChild(card);
});

update();
}

function update(){
document.getElementById("turnText").textContent=
turn===0?"あなたのターン":"CPUのターン";
document.getElementById("score").textContent=
`あなた:${scores[0]} / CPU:${scores[1]}`;
}

function onClick(card){
if(turn!==0||lock||card.classList.contains("flip")||card.classList.contains("taken"))return;

flip(card);
if(!first){first=card;return;}
second=card;
judge();
}

function flip(card){
card.classList.add("flip");
let v=card.dataset.value;
memory[v]=memory[v]||[];
if(!memory[v].includes(card)) memory[v].push(card);
}

function judge(){
lock=true;
setTimeout(()=>{
if(first.dataset.value===second.dataset.value){
first.classList.add("taken");
second.classList.add("taken");
scores[turn]++;
reset(true);
}else{
first.classList.remove("flip");
second.classList.remove("flip");
reset(false);
}
},600);
}

function reset(success){
first=null;second=null;lock=false;
if(!success) turn=1-turn;
update();

if(checkEnd()) return;
if(turn===1) setTimeout(cpu,700);
}

function cpu(){
let choices=[...document.querySelectorAll(".card:not(.flip):not(.taken)")];
let c1,c2;

// hardは記憶使う
if(difficulty==="hard"){
let pair=Object.values(memory).find(v=>v.length===2&&!v[0].classList.contains("taken"));
if(pair){[c1,c2]=pair;}
}

if(!c1){
c1=choices[Math.floor(Math.random()*choices.length)];
do{
c2=choices[Math.floor(Math.random()*choices.length)];
}while(c1===c2);
}

flip(c1);first=c1;
setTimeout(()=>{
flip(c2);second=c2;
judge();
},800);
}

function checkEnd(){
if(document.querySelectorAll(".taken").length===
(document.querySelectorAll(".card").length)){
setTimeout(endGame,300);
return true;
}
return false;
}

function endGame(){
let text="";
if(scores[0]>scores[1]) text="あなたの勝ち！";
else if(scores[1]>scores[0]) text="CPUの勝ち！";
else text="引き分け！";

document.getElementById("resultText").textContent=text;
document.getElementById("result").style.display="flex";
}

function restartGame(){
document.getElementById("result").style.display="none";
startGame();
}

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
return array;
}
</script>

</body>
</html>
