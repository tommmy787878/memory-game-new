<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>神経衰弱（強化版）</title>

<style>
body{margin:0;font-family:sans-serif;}
#startScreen{position:fixed;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.title{font-size:50px;margin-bottom:20px;}

button{padding:12px 30px;font-size:18px;margin-top:10px;}

#game{display:none;background:#0f172a;color:#fff;min-height:100vh;text-align:center;}

.board{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:10px;}
.card{aspect-ratio:3/4;perspective:800px;}
.inner{width:100%;height:100%;transition:.4s;transform-style:preserve-3d;position:relative;}
.card.flip .inner{transform:rotateY(180deg);}
.face{position:absolute;width:100%;height:100%;backface-visibility:hidden;}
.front{transform:rotateY(180deg);}
.face img{width:100%;height:100%;border-radius:10px;}
.taken{opacity:.4;}
</style>
</head>

<body>

<div id="startScreen">
<div class="title">神経衰弱</div>

<select id="difficulty">
<option value="easy">やさしい</option>
<option value="normal" selected>ふつう</option>
<option value="hard">むずかしい</option>
<option value="oni">鬼モード👹</option>
</select>

<button onclick="startGame()">スタート</button>
</div>

<div id="game">
<h2 id="turnText"></h2>
<p id="score"></p>
<div class="board" id="board"></div>
</div>

<script>
const baseCards=["AS","AH","AD","AC","KS"];
const getImg=c=>`https://deckofcardsapi.com/static/img/${c}.png`;
const backImg="https://deckofcardsapi.com/static/img/back.png";

let first=null,second=null,lock=false;
let turn=0;
let scores=[0,0];
let memory={};
let difficulty="normal";

/* 難易度設定 */
function cpuLevel(){
switch(difficulty){
case "easy": return {memory:0.2, accuracy:0.3};
case "normal": return {memory:0.5, accuracy:0.6};
case "hard": return {memory:0.9, accuracy:0.9};
case "oni": return {memory:1, accuracy:1};
}
}

function startGame(){
difficulty=document.getElementById("difficulty").value;
document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";
init();
}

function init(){
let board=document.getElementById("board");
board.innerHTML="";
first=second=null;lock=false;
turn=0;scores=[0,0];memory={};

let deck=[...baseCards,...baseCards].sort(()=>Math.random()-0.5);

deck.forEach(c=>{
let card=document.createElement("div");
card.className="card";
card.dataset.value=c;

let inner=document.createElement("div");
inner.className="inner";

let front=document.createElement("div");
front.className="face front";
front.innerHTML=`<img src="${getImg(c)}">`;

let back=document.createElement("div");
back.className="face";
back.innerHTML=`<img src="${backImg}">`;

inner.append(front,back);
card.appendChild(inner);

card.onclick=()=>onClick(card);

board.appendChild(card);
});

update();
}

function update(){
document.getElementById("turnText").textContent=turn===0?"あなた":"CPU";
document.getElementById("score").textContent=`あなた:${scores[0]} / CPU:${scores[1]}`;
}

function onClick(card){
if(turn!==0||lock||card.classList.contains("flip")||card.classList.contains("taken"))return;
flip(card);
if(!first){first=card;return;}
second=card;
judge();
}

function flip(card){
card.classList.add("flip");
let v=card.dataset.value;
memory[v]=memory[v]||[];
if(!memory[v].includes(card))memory[v].push(card);
}

function judge(){
lock=true;
setTimeout(()=>{
if(first.dataset.value===second.dataset.value){
first.classList.add("taken");
second.classList.add("taken");
scores[turn]++;
reset(true);
}else{
first.classList.remove("flip");
second.classList.remove("flip");
reset(false);
}
},600);
}

function reset(success){
first=second=null;lock=false;
if(!success)turn=1-turn;
update();
if(checkEnd())return;
if(turn===1)setTimeout(cpu,600);
}

function cpu(){
let level=cpuLevel();
let choices=[...document.querySelectorAll(".card:not(.flip):not(.taken)")];

// 👹鬼モード：完全解答
if(difficulty==="oni"){
for(let key in memory){
let pair=memory[key].filter(c=>!c.classList.contains("taken"));
if(pair.length>=2){
play(pair[0],pair[1]);
return;
}
}
}

// 記憶を使うか
if(Math.random()<level.memory){
for(let key in memory){
let known=memory[key].filter(c=>!c.classList.contains("taken"));
if(known.length>=2 && Math.random()<level.accuracy){
play(known[0],known[1]);
return;
}
}
}

// ランダム
let c1=choices[Math.floor(Math.random()*choices.length)];
let rest=choices.filter(c=>c!==c1);
let c2=rest[Math.floor(Math.random()*rest.length)];
play(c1,c2);
}

function play(c1,c2){
flip(c1);first=c1;
setTimeout(()=>{
flip(c2);second=c2;
judge();
},400);
}

function checkEnd(){
if(document.querySelectorAll(".taken").length===10){
setTimeout(()=>{
alert(scores[0]>scores[1]?"勝ち！":"負け…");
location.reload();
},300);
return true;
}
return false;
}
</script>

</body>
</html>
