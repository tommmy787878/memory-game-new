<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神経衰弱 完全版</title>

<style>
body { margin:0; font-family:sans-serif; }

#startScreen{
position:fixed;width:100%;height:100%;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
background:#fff;
}
.title{ font-size:60px; margin-bottom:30px; }

#startBtn{
font-size:32px;
padding:20px 80px;
border:none;
border-radius:15px;
background:#000;color:#fff;
cursor:pointer;
transition:0.2s;
}
#startBtn:hover{ transform:scale(1.1); }

select{ padding:12px; margin:10px; font-size:18px; }

#game{
display:none;background:#0f172a;color:white;
min-height:100vh;text-align:center;
}

.board{
display:grid;
gap:10px;padding:10px;
max-width:600px;margin:auto;
}

.card{ aspect-ratio:3/4; perspective:800px; }
.inner{ width:100%;height:100%; transition:0.4s; transform-style:preserve-3d; }
.card.flip .inner{ transform:rotateY(180deg); }

.face{ position:absolute;width:100%;height:100%; backface-visibility:hidden; }
.face img{ width:100%;height:100%;border-radius:10px; }
.front{ transform:rotateY(180deg); }
.taken{ opacity:0.4; }

#result{
position:fixed;top:0;left:0;
width:100%;height:100%;
display:none;
justify-content:center;align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.9);
color:white;
z-index:999;
}

.confetti{
position:fixed;width:8px;height:12px;
animation:fall linear forwards;
}
@keyframes fall{
to{ transform:translateY(100vh) rotate(720deg); }
}
</style>
</head>

<body>

<div id="startScreen">
<div class="title">神経衰弱</div>

<select id="difficulty">
<option value="easy">やさしい</option>
<option value="normal" selected>ふつう</option>
<option value="hard">むずかしい</option>
<option value="oni">鬼モード👹</option>
</select>

<button id="startBtn" onclick="startGame()">スタート</button>
</div>

<div id="game">
<h2 id="stageText"></h2>
<h3 id="turnText"></h3>
<p id="score"></p>
<div class="board" id="board"></div>
</div>

<div id="result">
<h2 id="resultText"></h2>
<button onclick="nextStage()">次へ</button>
<button onclick="goHome()">ホーム</button>
</div>

<script>

/* カード種類 */
const cardGroups = {
A:["AS","AH","AC","AD"],
K:["KS","KH","KC","KD"],
Q:["QS","QH","QC","QD"],
"8":["8S","8H","8C","8D"],
"7":["7S","7H","7C","7D"]
};

const getImg=c=>`https://deckofcardsapi.com/static/img/${c}.png`;
const backImg="https://deckofcardsapi.com/static/img/back.png";

/* カード選出 */
function getBalancedCards(count){
let result=[];
let keys=Object.keys(cardGroups);

while(result.length < count){
for(let k of keys){
if(result.length >= count) break;
let group=cardGroups[k];
let card=group[Math.floor(Math.random()*group.length)];
if(!result.includes(card)) result.push(card);
}
}
return result.sort(()=>Math.random()-0.5);
}

let stage=1;
let difficulty="normal";
let pairCounts=[5,8,12];

let first=null, second=null, lock=false;
let turn=0;
let scores=[0,0];
let memory={};

function startGame(){
difficulty=document.getElementById("difficulty").value;
stage=1;
document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";
init();
}

function init(){
let pair=pairCounts[stage-1];
let cards=getBalancedCards(pair);
let deck=[...cards,...cards].sort(()=>Math.random()-0.5);

let board=document.getElementById("board");
board.innerHTML="";
board.style.gridTemplateColumns=`repeat(${Math.ceil(Math.sqrt(pair*2))},1fr)`;

first=null; second=null; lock=false;
turn=0; scores=[0,0]; memory={};

deck.forEach(c=>{
let card=document.createElement("div");
card.className="card";
card.dataset.value=c;

let inner=document.createElement("div");
inner.className="inner";

let front=document.createElement("div");
front.className="face front";
front.innerHTML=`<img src="${getImg(c)}" onerror="this.src='${backImg}'">`;

let back=document.createElement("div");
back.className="face back";
back.innerHTML=`<img src="${backImg}">`;

inner.append(front,back);
card.appendChild(inner);
card.onclick=()=>onClick(card);

board.appendChild(card);
});

update();
}

function update(){
document.getElementById("stageText").textContent=`Stage ${stage}`;
document.getElementById("turnText").textContent =
turn===0?"あなたのターン":"CPUのターン";
document.getElementById("score").textContent =
`あなた:${scores[0]} / CPU:${scores[1]}`;
}

function onClick(card){
if(turn!==0 || lock || card.classList.contains("flip") || card.classList.contains("taken")) return;

flip(card);
if(!first){ first=card; return; }
second=card;
judge();
}

function flip(card){
card.classList.add("flip");
let v=card.dataset.value;
memory[v]=memory[v]||[];
if(!memory[v].includes(card)) memory[v].push(card);
}

function judge(){
lock=true;
setTimeout(()=>{
if(first.dataset.value===second.dataset.value){
first.classList.add("taken");
second.classList.add("taken");
scores[turn]++;
reset(true);
}else{
first.classList.remove("flip");
second.classList.remove("flip");
reset(false);
}
},500);
}

function reset(success){
first=null; second=null; lock=false;
if(!success) turn=1-turn;
update();

if(checkEnd()) return;
if(turn===1) setTimeout(cpu,600);
}

/* ★鬼ちょうどいい弱体化 */
function cpu(){
let choices=[...document.querySelectorAll(".card:not(.flip):not(.taken)")];

let useMemory=false;
if(difficulty==="normal") useMemory=Math.random()<0.5;
if(difficulty==="hard") useMemory=true;
if(difficulty==="oni") useMemory=Math.random()<0.5;

let knownPair=null;

if(useMemory){
for(let key in memory){
let cards=memory[key].filter(c=>!c.classList.contains("taken"));
if(cards.length>=2 && Math.random()<0.7){
knownPair=cards;
break;
}
}
}

let c1, c2;

if(knownPair){
c1=knownPair[0];
c2=knownPair[1];
}else{
c1=choices[Math.floor(Math.random()*choices.length)];
let rest=choices.filter(c=>c!==c1);

if(difficulty==="oni" && Math.random()<0.25){
let match=rest.find(c=>c.dataset.value===c1.dataset.value);
c2=match || rest[Math.floor(Math.random()*rest.length)];
}else{
c2=rest[Math.floor(Math.random()*rest.length)];
}
}

flip(c1); first=c1;
setTimeout(()=>{
flip(c2); second=c2;
judge();
},400);
}

function checkEnd(){
if(document.querySelectorAll(".taken").length===pairCounts[stage-1]*2){
setTimeout(endGame,300);
return true;
}
return false;
}

function endGame(){
let win = scores[0] > scores[1];
let text = win ? "ステージクリア！🎉" : "負けた…";

if(win && stage===3){
text="完全クリア！！🏆🎉";
confetti();
}

document.getElementById("resultText").textContent=text;
document.getElementById("result").style.display="flex";
}

function nextStage(){
document.getElementById("result").style.display="none";

if(scores[0]>scores[1] && stage<3){
stage++;
init();
}else{
goHome();
}
}

function goHome(){
document.getElementById("result").style.display="none";
document.getElementById("game").style.display="none";
document.getElementById("startScreen").style.display="flex";
}

function confetti(){
for(let i=0;i<150;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"%";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
c.style.animationDuration=(2+Math.random()*3)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),4000);
}
}

</script>
</body>
</html>
