<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神経衰弱</title>

<style>
body { margin:0; font-family:sans-serif; }
#startScreen{
position:fixed;width:100%;height:100%;
background:#fff;display:flex;
flex-direction:column;justify-content:center;align-items:center;
}
.title{ font-size:60px; letter-spacing:8px; margin-bottom:20px; }

select{ padding:14px 24px; margin-bottom:10px; font-size:20px; }

button{
padding:16px 50px;font-size:22px;
border:none;border-radius:10px;
cursor:pointer;transition:0.2s;
}
button:hover{ transform:scale(1.05); }
button:active{ transform:scale(0.9); }

#startBtn{ background:#000;color:#fff; }

#homeRanking{
margin-top:20px;
background:#f3f4f6;
padding:15px 25px;
border-radius:12px;
width:260px;
text-align:left;
}

/* ゲーム */
#game{
display:none;background:#0f172a;color:white;
min-height:100vh;text-align:center;
}

.board{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;padding:10px;
}

.card{ aspect-ratio:3/4; perspective:800px; }
.inner{
width:100%;height:100%;
transition:0.4s;transform-style:preserve-3d;
position:relative;
}
.card.flip .inner{ transform:rotateY(180deg) scale(1.05); }

.face{
position:absolute;width:100%;height:100%;
backface-visibility:hidden;
}
.face img{ width:100%;height:100%;border-radius:10px; }

.front{ transform:rotateY(180deg); }
.taken{ opacity:0.4; }

/* 結果 */
#result{
position:fixed;top:0;left:0;
width:100%;height:100%;
display:none;justify-content:center;align-items:center;
flex-direction:column;background:rgba(0,0,0,0.9);color:white;
}

#resultText{ font-size:42px;color:gold;margin-bottom:10px; }

#nameInputArea{ margin:15px; }

#playerName{
padding:10px;
font-size:18px;
border-radius:6px;
border:none;
margin-right:10px;
}

.confetti{
position:fixed;width:8px;height:12px;
animation:fall linear forwards;
}
@keyframes fall{
to{ transform:translateY(100vh) rotate(720deg); }
}
</style>

</head>

<body>

<div id="startScreen">
<div class="title">神経衰弱</div>

<select id="mode" onchange="loadHomeRanking()">
<option value="normal">通常モード</option>
<option value="time">制限時間モード（30秒）</option>
</select>

<select id="difficulty" onchange="loadHomeRanking()">
<option value="easy">やさしい</option>
<option value="normal" selected>ふつう</option>
<option value="hard">むずかしい</option>
<option value="oni">鬼モード👹</option>
</select>

<button id="startBtn" onclick="startGame()">あそぶ</button>

<div id="homeRanking"></div>
</div>

<div id="game">
<h2 id="turnText">あなたのターン</h2>
<p id="score">あなた:0 / CPU:0</p>
<p id="timer">時間: 0秒</p>
<div class="board" id="board"></div>
</div>

<div id="result">
<div id="resultText"></div>

<select id="difficultyResult">
<option value="easy">やさしい</option>
<option value="normal">ふつう</option>
<option value="hard">むずかしい</option>
<option value="oni">鬼モード👹</option>
</select>

<div id="nameInputArea">
<input id="playerName" placeholder="名前を入力" maxlength="10">
<button onclick="submitScore()">登録</button>
</div>

<div id="ranking"></div>

<button onclick="restartGame()">もう一度</button> <button onclick="goHome()">ホームに戻る</button>

</div>

<script>
const baseCards=["AS","AH","KD","KC","QS"];
const getImg=c=>`https://deckofcardsapi.com/static/img/${c}.png`;
const backImg="https://deckofcardsapi.com/static/img/back.png";

let first=null, second=null, lock=false;
let turn=0;
let scores=[0,0];
let memory={};
let difficulty="normal";
let mode="normal";

let startTime=0;
let timerInterval=null;
let finalTime=0;
let timeLimit=30;

/* ホームランキング */
function loadHomeRanking(){
let mode=document.getElementById("mode").value;

if(mode==="time"){
document.getElementById("homeRanking").innerHTML="";
return;
}

let diff=document.getElementById("difficulty").value;
let data=getRanking(diff);

let html="<b>ランキング</b>";
data.forEach((d,i)=>{
html+=`<p>${i+1}位 : ${d.name} - ${d.time}秒</p>`;
});
if(data.length===0) html+="<p>まだ記録なし</p>";

document.getElementById("homeRanking").innerHTML=html;
}

/* 共通取得 */
function getRanking(diff){
let key="ranking_"+diff;
let data=JSON.parse(localStorage.getItem(key))||[];

/* データ整形 */
if(data.length && typeof data[0]==="number"){
data=data.map(t=>({name:"名無し",time:t}));
}

return data;
}

function startGame(){
clearInterval(timerInterval);

difficulty=document.getElementById("difficulty").value;
mode=document.getElementById("mode").value;

document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";

startTime=Date.now();

timerInterval=setInterval(()=>{
let elapsed=Math.floor((Date.now()-startTime)/1000);

if(mode==="time"){
let remain=timeLimit - elapsed;
document.getElementById("timer").textContent=`残り: ${remain}秒`;
if(remain<=0) endGame();
}else{
document.getElementById("timer").textContent=`時間: ${elapsed}秒`;
}
},1000);

init();
}

function init(){
let board=document.getElementById("board");
board.innerHTML="";
first=null; second=null; lock=false;
turn=0; scores=[0,0]; memory={};

let deck=[...baseCards,...baseCards].sort(()=>Math.random()-0.5);

deck.forEach(c=>{
let card=document.createElement("div");
card.className="card";
card.dataset.value=c;

let inner=document.createElement("div");
inner.className="inner";

let front=document.createElement("div");
front.className="face front";
front.innerHTML=`<img src="${getImg(c)}">`;

let back=document.createElement("div");
back.className="face back";
back.innerHTML=`<img src="${backImg}">`;

inner.append(front,back);
card.appendChild(inner);
card.onclick=()=>onClick(card);

board.appendChild(card);
});

update();
}

function update(){
document.getElementById("turnText").textContent =
turn===0?"あなたのターン":"CPUのターン";

document.getElementById("score").textContent =
`あなた:${scores[0]} / CPU:${scores[1]}`;
}

function onClick(card){
if(turn!==0 || lock || card.classList.contains("flip") || card.classList.contains("taken")) return;

flip(card);

if(!first){ first=card; return; }

second=card;
judge();
}

function flip(card){
card.classList.add("flip");
let v=card.dataset.value;
memory[v]=memory[v]||[];
if(!memory[v].includes(card)) memory[v].push(card);
}

function judge(){
lock=true;

setTimeout(()=>{
if(first.dataset.value===second.dataset.value){
first.classList.add("taken");
second.classList.add("taken");
scores[turn]++;
reset(true);
}else{
first.classList.remove("flip");
second.classList.remove("flip");
reset(false);
}
},600);
}

function reset(success){
first=null; second=null; lock=false;
if(!success) turn=1-turn;
update();

if(checkEnd()) return;
if(turn===1) setTimeout(cpu,700);
}

function cpu(){
let choices=[...document.querySelectorAll(".card:not(.flip):not(.taken)")];
let c1=choices[Math.floor(Math.random()*choices.length)];
let rest=choices.filter(c=>c!==c1);
let c2=rest[Math.floor(Math.random()*rest.length)];

flip(c1); first=c1;

setTimeout(()=>{
flip(c2); second=c2;
judge();
},400);
}

function checkEnd(){
if(document.querySelectorAll(".taken").length===10){
setTimeout(endGame,300);
return true;
}
return false;
}

function endGame(){
clearInterval(timerInterval);
finalTime=Math.floor((Date.now()-startTime)/1000);

let text="";
let win=false;

if(scores[0]>scores[1]){ text="あなたの勝ち！🎉"; win=true; }
else if(scores[1]>scores[0]) text="CPUの勝ち…👹";
else text="引き分け！";

document.getElementById("resultText").textContent =
`${text}（${finalTime}秒）`;

document.getElementById("result").style.display="flex";

/* ★ランキング表示 */
showRanking(getRanking(difficulty));

let inputArea=document.getElementById("nameInputArea");
inputArea.style.display = win ? "block" : "none";

if(win){
document.getElementById("playerName").value =
localStorage.getItem("playerName") || "";
}
}

function submitScore(){
let name=document.getElementById("playerName").value.trim();
if(!name) name="名無し";

localStorage.setItem("playerName", name);

let key="ranking_"+difficulty;
let data=getRanking(difficulty);

data.push({name,time:finalTime});
data.sort((a,b)=>a.time-b.time);
data=data.slice(0,5);

localStorage.setItem(key,JSON.stringify(data));

/* ★即反映 */
showRanking(data);
loadHomeRanking();

document.getElementById("nameInputArea").innerHTML="<p>登録完了！</p>";
}

function showRanking(data){
let html="<h3>ランキング</h3>";
data.forEach((d,i)=>{
html+=`<p>${i+1}位 : ${d.name} - ${d.time}秒</p>`;
});
document.getElementById("ranking").innerHTML=html;
}

function restartGame(){
clearInterval(timerInterval);
document.getElementById("result").style.display="none";
startGame();
}

function goHome(){
clearInterval(timerInterval);
document.getElementById("result").style.display="none";
document.getElementById("game").style.display="none";
document.getElementById("startScreen").style.display="flex";
document.getElementById("timer").textContent="時間: 0秒";
loadHomeRanking();
}

/* 初期 */
loadHomeRanking();
</script>

</body>
</html>
