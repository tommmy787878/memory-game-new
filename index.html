<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神経衰弱</title>

<style>
body { margin:0; font-family:sans-serif; }
#startScreen{
position:fixed;width:100%;height:100%;
background:#fff;display:flex;
flex-direction:column;justify-content:center;align-items:center;
}
.title{ font-size:60px; margin-bottom:20px; }

select{ padding:12px; margin:8px; font-size:18px; }

button{
padding:14px 40px;font-size:20px;
border:none;border-radius:10px;
cursor:pointer;
}

#game{
display:none;background:#0f172a;color:white;
min-height:100vh;text-align:center;
}

.board{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;padding:10px;
}

.card{ aspect-ratio:3/4; perspective:800px; }
.inner{ width:100%;height:100%; transition:0.4s; transform-style:preserve-3d; }
.card.flip .inner{ transform:rotateY(180deg); }

.face{ position:absolute;width:100%;height:100%; backface-visibility:hidden; }
.face img{ width:100%;height:100%;border-radius:10px; }
.front{ transform:rotateY(180deg); }
.taken{ opacity:0.4; }

#result{
position:fixed;width:100%;height:100%;
display:none;justify-content:center;align-items:center;
flex-direction:column;background:rgba(0,0,0,0.9);color:white;
}
</style>
</head>

<body>

<div id="startScreen">
<div class="title">神経衰弱</div>

<select id="mode">
<option value="normal">通常モード</option>
<option value="time">制限時間モード（30秒）</option>
</select>

<select id="difficulty">
<option value="easy">やさしい</option>
<option value="normal" selected>ふつう</option>
<option value="hard">むずかしい</option>
<option value="oni">鬼モード👹</option>
</select>

<button onclick="startGame()">あそぶ</button>
</div>

<div id="game">
<h2 id="turnText"></h2>
<p id="score"></p>
<p id="timer"></p>
<div class="board" id="board"></div>
</div>

<div id="result">
<h2 id="resultText"></h2>
<button onclick="restartGame()">もう一度</button>
<button onclick="goHome()">ホームに戻る</button>
</div>

<script>
const baseCards=["AS","AH","KD","KC","QS"];
const getImg=c=>`https://deckofcardsapi.com/static/img/${c}.png`;
const backImg="https://deckofcardsapi.com/static/img/back.png";

let first=null, second=null, lock=false;
let turn=0;
let scores=[0,0];
let memory={};

let difficulty="normal";
let mode="normal";

let startTime=0;
let timerInterval=null;
let timeLimit=30;

/* 開始 */
function startGame(){
difficulty=document.getElementById("difficulty").value;
mode=document.getElementById("mode").value;

document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";

startTime=Date.now();

timerInterval=setInterval(()=>{
let elapsed=Math.floor((Date.now()-startTime)/1000);

if(mode==="time"){
let remain=timeLimit - elapsed;
document.getElementById("timer").textContent=`残り: ${remain}秒`;

if(remain<=0){
endGame();
}
}else{
document.getElementById("timer").textContent=`時間: ${elapsed}秒`;
}

},1000);

init();
}

function init(){
let board=document.getElementById("board");
board.innerHTML="";
first=null; second=null; lock=false;
turn=0; scores=[0,0]; memory={};

let deck=[...baseCards,...baseCards].sort(()=>Math.random()-0.5);

deck.forEach(c=>{
let card=document.createElement("div");
card.className="card";
card.dataset.value=c;

let inner=document.createElement("div");
inner.className="inner";

let front=document.createElement("div");
front.className="face front";
front.innerHTML=`<img src="${getImg(c)}">`;

let back=document.createElement("div");
back.className="face back";
back.innerHTML=`<img src="${backImg}">`;

inner.append(front,back);
card.appendChild(inner);
card.onclick=()=>onClick(card);

board.appendChild(card);
});

update();
}

function update(){
document.getElementById("turnText").textContent =
turn===0?"あなたのターン":"CPUのターン";

document.getElementById("score").textContent =
`あなた:${scores[0]} / CPU:${scores[1]}`;
}

function onClick(card){
if(turn!==0 || lock || card.classList.contains("flip") || card.classList.contains("taken")) return;

flip(card);

if(!first){ first=card; return; }

second=card;
judge();
}

function flip(card){
card.classList.add("flip");
let v=card.dataset.value;
memory[v]=memory[v]||[];
if(!memory[v].includes(card)) memory[v].push(card);
}

function judge(){
lock=true;

setTimeout(()=>{
if(first.dataset.value===second.dataset.value){
first.classList.add("taken");
second.classList.add("taken");
scores[turn]++;
reset(true);
}else{
first.classList.remove("flip");
second.classList.remove("flip");
reset(false);
}
},600);
}

function reset(success){
first=null; second=null; lock=false;
if(!success) turn=1-turn;
update();

if(checkEnd()) return;
if(turn===1) setTimeout(cpu,700);
}

/* CPU */
function cpu(){
let choices=[...document.querySelectorAll(".card:not(.flip):not(.taken)")];

let useMemory=false;
if(difficulty==="normal") useMemory=Math.random()<0.5;
if(difficulty==="hard") useMemory=true;
if(difficulty==="oni") useMemory=Math.random()<0.8;

let knownPair=null;

if(useMemory){
for(let key in memory){
let cards=memory[key].filter(c=>!c.classList.contains("taken"));
if(cards.length>=2){
knownPair=cards;
break;
}
}
}

let c1, c2;

if(knownPair){
c1=knownPair[0];
c2=knownPair[1];
}else{
c1=choices[Math.floor(Math.random()*choices.length)];
let rest=choices.filter(c=>c!==c1);

if(difficulty==="oni" && Math.random()<0.7){
let match=rest.find(c=>c.dataset.value===c1.dataset.value);
c2=match || rest[Math.floor(Math.random()*rest.length)];
}else{
c2=rest[Math.floor(Math.random()*rest.length)];
}
}

flip(c1); first=c1;

setTimeout(()=>{
flip(c2); second=c2;
judge();
},400);
}

function checkEnd(){
if(document.querySelectorAll(".taken").length===10){
setTimeout(endGame,300);
return true;
}
return false;
}

function endGame(){
clearInterval(timerInterval);

let text="";
if(scores[0]>scores[1]) text="あなたの勝ち！🎉";
else if(scores[1]>scores[0]) text="CPUの勝ち…👹";
else text="引き分け！";

document.getElementById("resultText").textContent=text;
document.getElementById("result").style.display="flex";
}

function restartGame(){
document.getElementById("result").style.display="none";
startGame();
}

function goHome(){
clearInterval(timerInterval);
document.getElementById("result").style.display="none";
document.getElementById("game").style.display="none";
document.getElementById("startScreen").style.display="flex";
}
</script>

</body>
</html>
