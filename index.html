<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神経衰弱</title>

<style>
body { margin:0; font-family:sans-serif; }

/* ===== スタート画面 ===== */
#startScreen{
position:fixed;width:100%;height:100%;
background:#fff;color:#000;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
}

.title{
font-size:60px;
letter-spacing:8px;
margin-bottom:30px;
}

/* ===== UI強化 ===== */
select{
padding:14px 24px;
margin-bottom:25px;
font-size:22px;
border:2px solid #000;
}

/* ボタン共通 */
button{
padding:18px 60px;
font-size:24px;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

/* スタートボタン */
#startBtn{
background:#000;color:#fff;
letter-spacing:4px;
}

/* 結果ボタン */
#result button{
background:#fff;
color:#000;
margin-top:20px;
}

/* ===== ボタンアニメーション ===== */
button:hover{
transform:scale(1.05);
}

button:active{
transform:scale(0.9);
}

/* ===== ゲーム ===== */
#game{
display:none;
background:#0f172a;
color:white;
min-height:100vh;
text-align:center;
}

.board{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
padding:10px;
}

.card{ aspect-ratio:3/4; perspective:800px; }

.inner{
width:100%;height:100%;
transition:0.4s;
transform-style:preserve-3d;
position:relative;
}

.card.flip .inner{ transform:rotateY(180deg) scale(1.05); }

.face{
position:absolute;
width:100%;height:100%;
backface-visibility:hidden;
}

.face img{
width:100%;height:100%;
border-radius:10px;
}

.front{ transform:rotateY(180deg); }
.taken{ opacity:0.4; }

/* ===== 結果画面 ===== */
#result{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.9);
color:white;
}

#resultText{
font-size:42px;
color:gold;
margin-bottom:10px;
}

/* 紙吹雪 */
.confetti{
position:fixed;
width:8px;height:12px;
animation:fall linear forwards;
}

@keyframes fall{
to{ transform:translateY(100vh) rotate(720deg); }
}
</style>

</head>

<body>

<!-- スタート -->

<div id="startScreen">
<div class="title">神経衰弱</div>

<select id="difficulty">
<option value="easy">やさしい（CPUよわい）</option>
<option value="normal" selected>ふつう</option>
<option value="hard">むずかしい（CPUつよい）</option>
</select>

<button id="startBtn" onclick="startGame()">あそぶ</button>

</div>

<!-- ゲーム -->

<div id="game">
<h2 id="turnText">あなたのターン</h2>
<p id="score">あなた:0 / CPU:0</p>
<div class="board" id="board"></div>
</div>

<!-- 結果 -->

<div id="result">
<div id="resultText"></div>

<select id="difficultyResult">
<option value="easy">やさしい</option>
<option value="normal">ふつう</option>
<option value="hard">むずかしい</option>
</select>

<button onclick="restartGame()">もう一度あそぶ</button>

</div>

<script>
const baseCards=["AS","AH","KD","KC","QS"];
const getImg=c=>`https://deckofcardsapi.com/static/img/${c}.png`;
const backImg="https://deckofcardsapi.com/static/img/back.png";

let first=null, second=null, lock=false;
let turn=0;
let scores=[0,0];
let memory={};
let difficulty="normal";

function startGame(){
difficulty=document.getElementById("difficulty").value;

document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";
init();
}

function init(){
let board=document.getElementById("board");
board.innerHTML="";
first=null; second=null; lock=false;
turn=0;
scores=[0,0];
memory={};

let deck=[...baseCards,...baseCards].sort(()=>Math.random()-0.5);

deck.forEach(c=>{
let card=document.createElement("div");
card.className="card";
card.dataset.value=c;

let inner=document.createElement("div");
inner.className="inner";

let front=document.createElement("div");
front.className="face front";
front.innerHTML=`<img src="${getImg(c)}">`;

let back=document.createElement("div");
back.className="face back";
back.innerHTML=`<img src="${backImg}">`;

inner.append(front,back);
card.appendChild(inner);

card.onclick=()=>onClick(card);

board.appendChild(card);
});

update();
}

function update(){
document.getElementById("turnText").textContent =
turn===0?"あなたのターン":"CPUのターン";

document.getElementById("score").textContent =
`あなた:${scores[0]} / CPU:${scores[1]}`;
}

function onClick(card){
if(turn!==0 || lock || card.classList.contains("flip") || card.classList.contains("taken")) return;

flip(card);

if(!first){
first=card;
return;
}

second=card;
judge();
}

function flip(card){
card.classList.add("flip");

let v=card.dataset.value;
memory[v]=memory[v]||[];
if(!memory[v].includes(card)){
memory[v].push(card);
}
}

function judge(){
lock=true;

setTimeout(()=>{
if(first.dataset.value===second.dataset.value){
first.classList.add("taken");
second.classList.add("taken");
scores[turn]++;
reset(true);
}else{
first.classList.remove("flip");
second.classList.remove("flip");
reset(false);
}
},600);
}

function reset(success){
first=null; second=null; lock=false;

if(!success) turn=1-turn;
update();

if(checkEnd()) return;

if(turn===1){
setTimeout(cpu,700);
}
}

function cpu(){
let choices=[...document.querySelectorAll(".card:not(.flip):not(.taken)")];

let c1,c2;

// 難易度別AI
if(difficulty==="hard"){
let pair = Object.values(memory).find(v=>v.length===2 && !v[0].classList.contains("taken"));
if(pair){ [c1,c2]=pair; }
}

if(!c1 && difficulty==="normal"){
if(Math.random()<0.5){
let pair = Object.values(memory).find(v=>v.length===2 && !v[0].classList.contains("taken"));
if(pair){ [c1,c2]=pair; }
}
}

if(!c1){
c1=choices[Math.floor(Math.random()*choices.length)];
do{
c2=choices[Math.floor(Math.random()*choices.length)];
}while(c1===c2);
}

flip(c1); first=c1;

setTimeout(()=>{
flip(c2); second=c2;
judge();
},400);
}

function checkEnd(){
if(document.querySelectorAll(".taken").length===10){
setTimeout(endGame,300);
return true;
}
return false;
}

function endGame(){
let text="";
if(scores[0]>scores[1]) text="あなたの勝ち！🎉";
else if(scores[1]>scores[0]) text="CPUの勝ち！";
else text="引き分け！";

document.getElementById("resultText").textContent=text;

let diff=document.getElementById("difficulty").value;
document.getElementById("difficultyResult").value=diff;

document.getElementById("result").style.display="flex";

/* 紙吹雪 */
for(let i=0;i<100;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"%";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
c.style.animationDuration=(1+Math.random())+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),2000);
}
}

function restartGame(){
let diff=document.getElementById("difficultyResult").value;
document.getElementById("difficulty").value=diff;
document.getElementById("result").style.display="none";
startGame();
}
</script>

</body>
</html>
